name: Dependency Upgrades

on:
  schedule:
    - cron: '22 10 * * 1'
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 23
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check for upgrades and apply in the repo root
        id: upgrades
        run: bash ./.github/scripts/dep-upgrades.sh

      - name: Check formatting
        if: steps.upgrades.outputs.root_updated == 'true'
        run: npm run fmt:check

      - name: Lint
        if: steps.upgrades.outputs.root_updated == 'true'
        run: npm run lint

      - name: Build
        if: steps.upgrades.outputs.root_updated == 'true'
        run: npm run build

      - name: Create Pull Request
        if: steps.upgrades.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: deps/upgrades
          title: 'deps: upgrade npm dependencies'
          body: ${{ steps.upgrades.outputs.body }}
          commit-message: 'deps: upgrade npm dependencies'
          labels: dependencies
          delete-branch: true
